<div id="bazi_modal_container" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:99999; justify-content:center; align-items:center; backdrop-filter: blur(3px);">
    <div class="bazi-modal-wrapper" style="position: relative; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 10px; padding: 20px;">
        
        <div id="bazi_modal_close" style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:24px; color:var(--SmartThemeBodyColor, #fff); z-index: 10; opacity: 0.8;">✖</div>
        
        <h2 style="text-align: center; color: #d4af37; margin-top: 0;">🔮 八字玄学求欧气阵法生成器</h2>
        <div class="notice">
            🔒 <strong>隐私安全提示：</strong> 本页面为前端本地运行。API 密钥及命主生辰八字仅保留在设备本地，直接与测算接口沟通，绝无外泄可能。
        </div>

        <div style="margin-bottom: 15px;">
            <label style="cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--SmartThemeBodyColor);">
                <input id="bazi_use_st_api" type="checkbox" checked style="width: 18px; height: 18px; margin: 0;" />
                <span>使用酒馆当前主 API (推荐，勾选后无需填写下方独立配置)</span>
            </label>
        </div>

        <details class="api-config" id="bazi_custom_api_block" style="display: none;">
            <summary style="cursor: pointer; font-weight: bold; color: var(--SmartThemeBodyColor);">⚙️ 独立第二 API 设置 (点击展开/折叠)</summary>
            <div style="margin-top: 10px;">
                <div class="input-group">
                    <label>API 接口地址:</label>
                    <input type="text" id="bazi_apiUrl" placeholder="例如: https://api.openai.com/v1/chat/completions">
                </div>
                <div class="input-group">
                    <label>API Key:</label>
                    <input type="password" id="bazi_apiKey" placeholder="sk-...">
                </div>
                <div class="input-group">
                    <label>模型 (Model):</label>
                    <select id="bazi_modelInput">
                        <option value="deepseek-v4-lite-web-chat">deepseek-v4-lite-web-chat</option>
                        <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
                        <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                        <option value="gpt-5.4">gpt-5.4</option>
                    </select>
                </div>
            </div>
        </details>

        <h3 class="section-title">📜 命主基本信息</h3>

        <div class="flex-input input-group">
            <div>
                <label>性别</label>
                <select id="bazi_gender">
                    <option value="女">女</option>
                    <option value="男">男</option>
                </select>
            </div>
            <div>
                <label>阳历生日</label>
                <input type="date" id="bazi_birthday">
            </div>
        </div>

        <div class="input-group">
            <label>出生时间 (留空则默认任选当天吉时)</label>
            <input type="text" id="bazi_birthTime" placeholder="例如: 早上8点半, 辰时">
        </div>

        <div class="input-group">
            <label>出生地 <span id="bazi_birth-loading" style="font-size: 12px; color: #d4af37;">(省市区数据加载中...)</span></label>
            <div class="location-group" id="bazi_birth-group">
                <select class="prov"><option value="">请选择省份</option></select>
                <select class="city"><option value="">请选择城市</option></select>
                <select class="dist"><option value="">请选择区县</option></select>
                <input type="text" class="other" placeholder="请输入海外国家或详细地址">
            </div>
        </div>

        <div class="input-group">
            <label>现居住地</label>
            <div class="location-group" id="bazi_live-group">
                <select class="prov"><option value="">请选择省份</option></select>
                <select class="city"><option value="">请选择城市</option></select>
                <select class="dist"><option value="">请选择区县</option></select>
                <input type="text" class="other" placeholder="请输入海外国家或详细地址">
            </div>
        </div>

        <h3 class="section-title">✨ 所求何事</h3>
        <div class="input-group">
            <label>想要许什么愿望？(越具体越好如游戏名，主角名)</label>
            <textarea id="bazi_wish" rows="3" placeholder="例如：明天中午玩某某游戏抽卡出限定角色，或者拆盲盒/吧唧出隐藏款"></textarea>
        </div>

        <button id="bazi_sendBtn" class="bazi-submit-btn">🙏 结印排盘，生成专属欧气阵法</button>

        <div class="output-container">
            <div class="box" id="bazi_box-summary">
                <strong class="box-title">🌟 极简阵法口诀</strong>
                <div id="bazi_summary-content" class="content-area">等待大师起卦...</div>
            </div>
            <div class="box" id="bazi_box-details">
                <strong class="box-title">📜 八字解析与详细步骤</strong>
                <div id="bazi_details-content" class="content-area">等待大师起卦...</div>
            </div>
        </div>
    </div>
</div>
